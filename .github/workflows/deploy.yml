# ==============================================================================
# Deploy — Stage 2 (infra) + Stage 3 (code)
#
# Triggered automatically on push to main, or manually via workflow_dispatch.
# Requires the Bootstrap workflow to have run at least once first.
#
# Required GitHub configuration (Settings → Secrets and variables):
#
#   Secrets:
#     AZURE_CLIENT_ID       — App Registration / managed identity client ID
#     AZURE_TENANT_ID       — Azure AD tenant ID
#     AZURE_SUBSCRIPTION_ID — Target subscription ID
#
#   Variables (non-sensitive):
#     WORKLOAD                         — e.g. runner
#     ENVIRONMENT                      — e.g. poc
#     INSTANCE                         — e.g. bvt
#     AZURE_LOCATION                   — e.g. westeurope
#     STATE_STORAGE_ACCOUNT_NAME       — e.g. strunnerpocbvt (override if differs from convention)
#     STATE_CONTAINER_NAME             — e.g. tfstate
#     GH_ORG                           — e.g. patrickthor
#     GH_REPO                          — e.g. patrickthor/github-runners
# ==============================================================================

name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  # ----------------------------------------------------------------------------
  # Stage 2 — Infrastructure
  # ----------------------------------------------------------------------------
  infra:
    name: "Stage 2 — Infrastructure"
    runs-on: ubuntu-latest

    env:
      ARM_USE_OIDC:       true
      ARM_CLIENT_ID:      ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:      ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    outputs:
      function_app_name:  ${{ steps.tf-output.outputs.function_app_name }}
      resource_group:     ${{ steps.tf-output.outputs.resource_group_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false   # needed for clean output capture

      - name: Generate backend.hcl
        env:
          WORKLOAD:    ${{ vars.WORKLOAD }}
          ENVIRONMENT: ${{ vars.ENVIRONMENT }}
          INSTANCE:    ${{ vars.INSTANCE }}
          STORAGE:     ${{ vars.STATE_STORAGE_ACCOUNT_NAME || '' }}
          CONTAINER:   ${{ vars.STATE_CONTAINER_NAME || 'tfstate' }}
        run: |
          # Use override if set, otherwise derive from naming convention
          STORAGE_NAME="${STORAGE:-st${WORKLOAD}${ENVIRONMENT}${INSTANCE}}"
          RG_NAME="rg-${WORKLOAD}-${ENVIRONMENT}-${INSTANCE}"
          cat > backend.hcl <<EOF
          resource_group_name  = "$RG_NAME"
          storage_account_name = "$STORAGE_NAME"
          container_name       = "$CONTAINER"
          key                  = "github-runners.tfstate"
          use_azuread_auth     = true
          EOF

      - name: Generate terraform.tfvars
        env:
          WORKLOAD:               ${{ vars.WORKLOAD }}
          ENVIRONMENT:            ${{ vars.ENVIRONMENT }}
          INSTANCE:               ${{ vars.INSTANCE }}
          LOCATION:               ${{ vars.AZURE_LOCATION }}
          SUBSCRIPTION_ID:        ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          GH_ORG:                 ${{ vars.GH_ORG }}
          GH_REPO:                ${{ vars.GH_REPO }}
          GH_APP_ID_SECRET:       ${{ vars.GITHUB_APP_ID_SECRET_NAME || 'github-app-id' }}
          GH_APP_INST_SECRET:     ${{ vars.GITHUB_APP_INSTALLATION_ID_SECRET_NAME || 'github-app-installation-id' }}
          GH_APP_KEY_SECRET:      ${{ vars.GITHUB_APP_PRIVATE_KEY_SECRET_NAME || 'github-app-private-key' }}
          RUNNER_WORKLOAD_ROLES:  ${{ vars.RUNNER_WORKLOAD_ROLES || '' }}
          CREATE_RG:              ${{ vars.CREATE_RESOURCE_GROUP || 'true' }}
          ENABLE_LOCKS:           ${{ vars.ENABLE_RESOURCE_LOCKS || 'false' }}
        run: |
          # Parse comma-separated roles into JSON array using jq
          if [ -z "$RUNNER_WORKLOAD_ROLES" ]; then
            ROLES_TF="[]"
          else
            ROLES_TF=$(echo "$RUNNER_WORKLOAD_ROLES" | jq -R 'split(",") | map(select(length > 0) | gsub("^\\s+|\\s+$"; ""))')
          fi
          cat > terraform.tfvars <<EOF
          workload        = "$WORKLOAD"
          environment     = "$ENVIRONMENT"
          instance        = "$INSTANCE"
          location        = "$LOCATION"
          subscription_id = "$SUBSCRIPTION_ID"
          github_org      = "$GH_ORG"
          github_repo     = "$GH_REPO"
          github_app_id_secret_name              = "$GH_APP_ID_SECRET"
          github_app_installation_id_secret_name = "$GH_APP_INST_SECRET"
          github_app_private_key_secret_name     = "$GH_APP_KEY_SECRET"
          runner_workload_roles = $ROLES_TF
          create_resource_group = $CREATE_RG
          enable_resource_locks = $ENABLE_LOCKS
          EOF

      - name: Terraform init
        run: terraform init -input=false -backend-config=backend.hcl -upgrade

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -out=tfplan -input=false

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false tfplan

      - name: Import runner image into ACR
        env:
          WORKLOAD:    ${{ vars.WORKLOAD }}
          ENVIRONMENT: ${{ vars.ENVIRONMENT }}
          INSTANCE:    ${{ vars.INSTANCE }}
        run: |
          ACR_NAME="cr${WORKLOAD}${ENVIRONMENT}${INSTANCE}"
          az acr import \
            --name "$ACR_NAME" \
            --source ghcr.io/myoung34/docker-github-actions-runner:latest \
            --image actions-runner:latest \
            --force

      - name: Capture outputs
        id: tf-output
        run: |
          echo "function_app_name=$(terraform output -raw function_app_name)" >> "$GITHUB_OUTPUT"
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------------------------
  # Stage 3 — Function App code
  #
  # Deploys the Python scaler function to Flex Consumption.
  # We install dependencies locally and deploy a self-contained zip
  # (no --build-remote) to avoid Kudu restart issues on FC1.
  # The runner's public IP is temporarily whitelisted so the post-deploy
  # health check can reach the app through the IP restrictions.
  # ----------------------------------------------------------------------------
  deploy:
    name: "Stage 3 — Function App code"
    needs: infra
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scaler-function

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Get runner public IP
        id: runner-ip
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "ip=${RUNNER_IP}" >> "$GITHUB_OUTPUT"
          echo "Runner public IP: ${RUNNER_IP}"

      - name: Whitelist runner IP on Function App
        run: |
          APP="${{ needs.infra.outputs.function_app_name }}"
          RG="${{ needs.infra.outputs.resource_group }}"
          RUNNER_IP="${{ steps.runner-ip.outputs.ip }}"

          echo "Adding ${RUNNER_IP}/32 to Function App IP restrictions..."
          az functionapp config access-restriction add \
            --resource-group "$RG" \
            --name "$APP" \
            --rule-name "github-actions-deploy" \
            --action Allow \
            --ip-address "${RUNNER_IP}/32" \
            --priority 50 \
            -o none

      - name: Install dependencies and create deployment zip
        run: |
          pip install --target=".python_packages/lib/site-packages" -r requirements.txt
          zip -r ../deploy.zip . \
            -x "local.settings*.json" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x "DEPLOYMENT.md"

      - name: Deploy to Function App
        run: |
          APP="${{ needs.infra.outputs.function_app_name }}"
          RG="${{ needs.infra.outputs.resource_group }}"

          echo "Deploying zip to Flex Consumption Function App..."
          az functionapp deployment source config-zip \
            --resource-group "$RG" \
            --name "$APP" \
            --src ../deploy.zip \
            --timeout 300

          echo "Deployment complete."

      - name: Remove runner IP from Function App
        if: always()
        run: |
          APP="${{ needs.infra.outputs.function_app_name }}"
          RG="${{ needs.infra.outputs.resource_group }}"

          echo "Removing temporary deploy IP restriction..."
          az functionapp config access-restriction remove \
            --resource-group "$RG" \
            --name "$APP" \
            --rule-name "github-actions-deploy" \
            -o none || true
