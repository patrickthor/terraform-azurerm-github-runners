# ==============================================================================
# Deploy — Stage 2 (infra) + Stage 3 (code)
#
# Triggered automatically on push to main, or manually via workflow_dispatch.
# Requires the Bootstrap workflow to have run at least once first.
#
# Required GitHub configuration (Settings → Secrets and variables):
#
#   Secrets:
#     AZURE_CLIENT_ID       — App Registration / managed identity client ID
#     AZURE_TENANT_ID       — Azure AD tenant ID
#     AZURE_SUBSCRIPTION_ID — Target subscription ID
#
#   Variables (non-sensitive):
#     AZURE_RESOURCE_GROUP             — e.g. rg-runner-poc-bvt
#     AZURE_LOCATION                   — e.g. westeurope
#     ACR_NAME                         — e.g. crrunnerpocbvt
#     ACI_NAME                         — e.g. ci-runner-poc-bvt
#     KEY_VAULT_NAME                   — e.g. kv-runner-poc-bvt
#     STATE_STORAGE_ACCOUNT_NAME       — e.g. strunnerpocbvt
#     STATE_CONTAINER_NAME             — e.g. tfstate
#     FUNCTION_STORAGE_ACCOUNT_NAME    — e.g. stfnrunnerpocbvt
#     FUNCTION_APP_NAME                — e.g. func-runner-poc-bvt
#     SERVICEBUS_NAMESPACE_NAME        — e.g. sbns-runner-poc-bvt
#     GH_ORG                           — e.g. patrickthor
#     GH_REPO                          — e.g. patrickthor/github-runners
# ==============================================================================

name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  # ----------------------------------------------------------------------------
  # Stage 2 — Infrastructure
  # ----------------------------------------------------------------------------
  infra:
    name: "Stage 2 — Infrastructure"
    runs-on: ubuntu-latest

    env:
      ARM_USE_OIDC:       true
      ARM_CLIENT_ID:      ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:      ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    outputs:
      function_app_name:  ${{ steps.tf-output.outputs.function_app_name }}
      resource_group:     ${{ vars.AZURE_RESOURCE_GROUP }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false   # needed for clean output capture

      - name: Generate backend.hcl
        env:
          RG:      ${{ vars.AZURE_RESOURCE_GROUP }}
          STORAGE: ${{ vars.STATE_STORAGE_ACCOUNT_NAME }}
          CONTAINER: ${{ vars.STATE_CONTAINER_NAME || 'tfstate' }}
        run: |
          cat > backend.hcl <<EOF
          resource_group_name  = "$RG"
          storage_account_name = "$STORAGE"
          container_name       = "$CONTAINER"
          key                  = "github-runners.tfstate"
          use_azuread_auth     = true
          EOF

      - name: Generate terraform.tfvars
        env:
          RG:              ${{ vars.AZURE_RESOURCE_GROUP }}
          LOCATION:        ${{ vars.AZURE_LOCATION }}
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ACR_NAME:        ${{ vars.ACR_NAME }}
          ACI_NAME:        ${{ vars.ACI_NAME }}
          KV_NAME:         ${{ vars.KEY_VAULT_NAME }}
          STATE_ST:        ${{ vars.STATE_STORAGE_ACCOUNT_NAME }}
          FUNC_ST:         ${{ vars.FUNCTION_STORAGE_ACCOUNT_NAME }}
          FUNC_APP:        ${{ vars.FUNCTION_APP_NAME }}
          SBNS:            ${{ vars.SERVICEBUS_NAMESPACE_NAME }}
          GH_ORG:          ${{ vars.GH_ORG }}
          GH_REPO:         ${{ vars.GH_REPO }}
          GH_APP_ID_SECRET:       ${{ vars.GITHUB_APP_ID_SECRET_NAME || 'github-app-id' }}
          GH_APP_INST_SECRET:     ${{ vars.GITHUB_APP_INSTALLATION_ID_SECRET_NAME || 'github-app-installation-id' }}
          GH_APP_KEY_SECRET:      ${{ vars.GITHUB_APP_PRIVATE_KEY_SECRET_NAME || 'github-app-private-key' }}
          RUNNER_WORKLOAD_ROLES:  ${{ vars.RUNNER_WORKLOAD_ROLES || '' }}
          CREATE_RG:              ${{ vars.CREATE_RESOURCE_GROUP || 'true' }}
          ENABLE_LOCKS:           ${{ vars.ENABLE_RESOURCE_LOCKS || 'false' }}
        run: |
          ROLES_TF=$(echo "$RUNNER_WORKLOAD_ROLES" | python3 -c "import sys,json; roles=[r.strip() for r in sys.stdin.read().strip().split(',') if r.strip()]; print(json.dumps(roles))")
          cat > terraform.tfvars <<EOF
          resource_group_name           = "$RG"
          location                      = "$LOCATION"
          subscription_id               = "$SUBSCRIPTION_ID"
          acr_name                      = "$ACR_NAME"
          aci_name                      = "$ACI_NAME"
          key_vault_name                = "$KV_NAME"
          storage_account_name          = "$STATE_ST"
          function_storage_account_name = "$FUNC_ST"
          function_app_name             = "$FUNC_APP"
          servicebus_namespace_name     = "$SBNS"
          github_org                    = "$GH_ORG"
          github_repo                   = "$GH_REPO"
          github_app_id_secret_name              = "$GH_APP_ID_SECRET"
          github_app_installation_id_secret_name = "$GH_APP_INST_SECRET"
          github_app_private_key_secret_name     = "$GH_APP_KEY_SECRET"
          runner_workload_roles         = $ROLES_TF
          create_resource_group         = $CREATE_RG
          enable_resource_locks         = $ENABLE_LOCKS
          EOF

      - name: Terraform init
        run: terraform init -input=false -backend-config=backend.hcl

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -out=tfplan -input=false

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false tfplan

      - name: Import runner image into ACR
        env:
          ACR_NAME: ${{ vars.ACR_NAME }}
        run: |
          az acr import \
            --name "$ACR_NAME" \
            --source ghcr.io/myoung34/docker-github-actions-runner:latest \
            --image actions-runner:latest \
            --force

      - name: Capture outputs
        id: tf-output
        run: |
          echo "function_app_name=$(terraform output -raw function_app_name)" >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------------------------
  # Stage 3 — Function App code
  #
  # Flex Consumption (FC1) does NOT support Kudu zipdeploy. It requires
  # "One Deploy" technology. We use `az functionapp deploy` which auto-detects
  # FC1 and deploys via the correct blob-based mechanism.
  # https://learn.microsoft.com/azure/azure-functions/functions-deployment-technologies
  # ----------------------------------------------------------------------------
  deploy:
    name: "Stage 3 — Function App code"
    needs: infra
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scaler-function

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create deployment zip
        run: |
          # Pre-install dependencies so the zip is self-contained (no server-side build).
          pip install \
            --target .python_packages/lib/site-packages \
            --upgrade \
            -r requirements.txt
          zip -r ../deploy.zip . \
            -x "local.settings*.json" \
            -x "__pycache__/*" \
            -x "*.pyc"

      - name: Deploy to Function App (One Deploy)
        run: |
          APP="${{ needs.infra.outputs.function_app_name }}"
          RG="${{ needs.infra.outputs.resource_group }}"

          # Clean up legacy settings that conflict with FC1 One Deploy.
          az functionapp config appsettings delete \
            --resource-group "$RG" --name "$APP" \
            --setting-names WEBSITE_RUN_FROM_PACKAGE ENABLE_ORYX_BUILD SCM_DO_BUILD_DURING_DEPLOYMENT 2>/dev/null || true

          # Deploy via One Deploy (the only deployment technology FC1 supports).
          # az functionapp deploy auto-detects Flex Consumption and uses the
          # correct blob-storage-based deployment path.
          echo "Deploying zip via One Deploy..."
          az functionapp deploy \
            --resource-group "$RG" \
            --name "$APP" \
            --src-path ../deploy.zip \
            --type zip \
            --clean true \
            --restart true

          echo "Deployment complete."
