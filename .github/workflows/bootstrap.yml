# ==============================================================================
# Bootstrap — one-time setup of Terraform remote state storage
#
# Run this ONCE before the first deployment:
#   GitHub → Actions → Bootstrap → Run workflow
#
# If the storage account already exists from a previous bootstrap run, set
# the "skip_create" input to true — the job will adopt it and only ensures
# the blob container.
#
# Required GitHub configuration (Settings → Secrets and variables):
#
#   Secrets:
#     AZURE_CLIENT_ID       — App Registration / managed identity client ID
#     AZURE_TENANT_ID       — Azure AD tenant ID
#     AZURE_SUBSCRIPTION_ID — Target subscription ID
#
#   Variables:
#     WORKLOAD                     — e.g. runner
#     ENVIRONMENT                  — e.g. poc
#     INSTANCE                     — e.g. bvt
#     AZURE_LOCATION               — e.g. westeurope
#     STATE_STORAGE_ACCOUNT_NAME   — e.g. strunnerpocbvt  (optional, auto-derived)
#     STATE_CONTAINER_NAME         — e.g. tfstate  (optional, defaults below)
# ==============================================================================

name: Bootstrap

on:
  workflow_dispatch:
    inputs:
      skip_create:
        description: "Storage account already exists — adopt instead of create"
        type: boolean
        default: false

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  bootstrap:
    name: Provision state storage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bootstrap

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Azure login (OIDC)
        uses: azure/login@eec3c95657c1536435858eda1f3ff5437fee8474 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "~> 1.9"

      - name: Generate bootstrap tfvars
        env:
          WORKLOAD:        ${{ vars.WORKLOAD }}
          ENVIRONMENT:     ${{ vars.ENVIRONMENT }}
          INSTANCE:        ${{ vars.INSTANCE }}
          LOCATION:        ${{ vars.AZURE_LOCATION }}
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          STORAGE_ACCOUNT: ${{ vars.STATE_STORAGE_ACCOUNT_NAME || '' }}
          CONTAINER:       ${{ vars.STATE_CONTAINER_NAME || 'tfstate' }}
          SKIP_CREATE:     ${{ inputs.skip_create }}
        run: |
          RESOURCE_GROUP="rg-${WORKLOAD}-${ENVIRONMENT}-${INSTANCE}"
          STORAGE_NAME="${STORAGE_ACCOUNT:-st${WORKLOAD}${ENVIRONMENT}${INSTANCE}}"
          cat > terraform.tfvars <<EOF
          resource_group_name        = "$RESOURCE_GROUP"
          location                   = "$LOCATION"
          subscription_id            = "$SUBSCRIPTION_ID"
          state_storage_account_name = "$STORAGE_NAME"
          state_container_name       = "$CONTAINER"
          use_existing_storage       = $SKIP_CREATE
          EOF

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false

      - name: Grant CI identity Storage Blob Data Contributor on state storage
        env:
          CLIENT_ID:   ${{ secrets.AZURE_CLIENT_ID }}
          WORKLOAD:    ${{ vars.WORKLOAD }}
          ENVIRONMENT: ${{ vars.ENVIRONMENT }}
          INSTANCE:    ${{ vars.INSTANCE }}
          STORAGE:     ${{ vars.STATE_STORAGE_ACCOUNT_NAME || '' }}
        run: |
          RG="rg-${WORKLOAD}-${ENVIRONMENT}-${INSTANCE}"
          STORAGE_NAME="${STORAGE:-st${WORKLOAD}${ENVIRONMENT}${INSTANCE}}"
          PRINCIPAL_ID=$(az ad sp show --id "$CLIENT_ID" --query id -o tsv)
          STORAGE_ID=$(az storage account show --name "$STORAGE_NAME" --resource-group "$RG" --query id -o tsv)
          if az role assignment list --assignee "$PRINCIPAL_ID" --scope "$STORAGE_ID" \
               --query "[?roleDefinitionName=='Storage Blob Data Contributor']" -o tsv | grep -q .; then
            echo "Role already assigned — skipping."
          else
            az role assignment create \
              --assignee-object-id "$PRINCIPAL_ID" \
              --assignee-principal-type ServicePrincipal \
              --role "Storage Blob Data Contributor" \
              --scope "$STORAGE_ID"
            echo "Role assigned successfully."
          fi

      - name: Print backend config snippet
        run: terraform output -raw backend_hcl_snippet
